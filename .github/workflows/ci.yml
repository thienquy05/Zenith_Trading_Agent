name: CI

on:
  push:
    branches: [master]
  # No branch filter: PRs must get CI regardless of their base branch
  # (review PRs here often target non-master branches).
  pull_request:

env:
  POSTGRES_USER: trading_app
  POSTGRES_PASSWORD: ci_test_password
  POSTGRES_APP_USER: trading_runtime
  POSTGRES_APP_PASSWORD: ci_test_app_password
  POSTGRES_DB: trading_test
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  CREDENTIAL_ENCRYPTION_KEY: "sN3F3s0Z2A8p7Q0Yy8mM8oZfE9wQe8Lz3iZ8mQe8Lz0="
  ENVIRONMENT: test

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trading_app
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: trading_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trading_app -d trading_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests alembic

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Migration round-trip (upgrade -> downgrade -> upgrade)
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: Run tests
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Dependency audit (npm audit)
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build
